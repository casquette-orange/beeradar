<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍺 Beer Radar</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🍺 Beer Radar</h1>

        <button id="searchButton">
            Trouver un bar
        </button>

    <div id="compassContainer">

        <svg id="compassRose"
            viewBox="0 0 200 200">

            <circle
                cx="100"
                cy="100"
                r="95"
                fill="white"
                stroke="black"
                stroke-width="4"
            />

            <text x="100" y="20"
                text-anchor="middle">N</text>

            <text x="100" y="180"
                text-anchor="middle">S</text>

            <text x="20" y="100"
                text-anchor="middle">W</text>

            <text x="180" y="100"
                text-anchor="middle">E</text>

        </svg>

        <svg id="arrow"
            viewBox="0 0 100 100">

            <polygon
                points="50,0 65,70 50,55 35,70"
                fill="red"
            />

        </svg>

    </div>

        <div id="status">
            Appuyez sur "Trouver un bar"
        </div>

        <div id="debug"></div>

    </div>

    <script src="app.js?v=10"></script>

</body>

</html>
